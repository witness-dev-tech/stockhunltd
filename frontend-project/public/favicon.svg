<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="100%" height="100%">
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a" rx="32"/>

  <circle cx="80" cy="80" r="60" fill="none" stroke="#1e293b" stroke-width="4" />
  <circle cx="80" cy="80" r="60" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-dasharray="90 60" stroke-dashoffset="30" filter="url(#neonGlow)" opacity="0.9"/>
  
  <g transform="translate(80, 78)">
    <path d="M 0,-38 L 36,-17 L 0,4 L -36,-17 Z" fill="#6366f1" opacity="0.85"/>
    <path d="M 0,-38 L 36,-17 L 0,4 L -36,-17 Z" fill="none" stroke="#fee2e2" stroke-width="1" opacity="0.3"/>
    
    <path d="M -36,-17 L 0,4 L 0,42 L -36,21 Z" fill="url(#boxGrad)"/>
    
    <path d="M 0,4 L 36,-17 L 36,21 L 0,42 Z" fill="#3730a3"/>

    <path d="M 11,-7 L 25,-15 L 25,-3 L 11,5 Z" fill="url(#accentGrad)" opacity="0.9" filter="url(#neonGlow)"/>
    <path d="M -25,-7 L -11,1 L -11,13 L -25,5 Z" fill="#10b981" opacity="0.9" filter="url(#neonGlow)"/>
  </g>

  <path d="M 40,105 L 68,80 L 88,95 L 122,63" fill="none" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)"/>
  <path d="M 108,63 L 122,63 L 122,77" fill="none" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)"/>
  
  <circle cx="122" cy="63" r="3.5" fill="#ffffff" filter="url(#neonGlow)"/>
</svg>
